<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Réunions</title>
    <link rel="stylesheet" href="tableauDeBord.css">
</head>

<body>
    <div class="container">
        <!-- Onglets -->
        <div class="tabs">
            <button class="tab-button active" data-tab="saisir">Saisir</button>
            <button class="tab-button" data-tab="reunion">Réunion</button>
            <button class="tab-button" data-tab="consulter">Consulter</button>
            <button class="tab-button" data-tab="modifier">Modifier</button>
        </div>

        <!-- ONGLET SAISIR -->
        <div id="tab-saisir" class="tab-content active">
            <!-- Ordre du jour -->
            <div class="section">
                <h2 class="section-title">Ordre du jour</h2>

                <div class="form-group form-group-inline">
                    <div>
                        <label class="form-label">Date de la réunion :</label>
                        <input type="date" class="form-input form-date" id="saisir-date">
                    </div>

                    <div>
                        <label class="form-label">Réunions suivantes :</label>
                        <select class="form-select" id="saisir-reunions-suivantes">
                            <option value="">-- Sélectionner une autre date --</option>
                        </select>
                    </div>
                </div>

                <div id="saisir-dossiers">
                    <div class="dossier-block" data-dossier="1">
                        <div class="dossier-header">
                            <span class="dossier-number">Dossier 1</span>
                        </div>
                        <div class="dossier-fields">
                            <div class="form-group">
                                <label class="form-label">Dossier :</label>
                                <div class="autocomplete-container">
                                    <input type="text" class="form-input autocomplete-input dossier-intitule"
                                        placeholder="Intitulé du dossier">
                                    <div class="autocomplete-suggestions"></div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Porteur(s) :</label>
                                <div class="multi-select dossier-porteurs">
                                    <!-- Généré dynamiquement -->
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Actions à mettre en œuvre – étapes :</label>
                                <div class="autocomplete-container">
                                    <textarea class="form-textarea autocomplete-input dossier-actions"
                                        placeholder="Décrire les actions et étapes"></textarea>
                                    <div class="autocomplete-suggestions"></div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Échéance :</label>
                                <input type="date" class="form-input form-date dossier-echeance">
                            </div>

                            <div class="form-group">
                                <label class="form-label">État :</label>
                                <select class="form-select dossier-etat form-select-small">
                                    <option value="">-- Sélectionner --</option>
                                    <!-- Généré dynamiquement -->
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn-secondary" id="btn-add-dossier">+ Ajouter un dossier</button>
            </div>

            <div class="button-group">
                <button type="button" class="btn-primary" id="btn-valider-saisie">Valider la saisie</button>
            </div>
        </div>

        <!-- ONGLET RÉUNION -->
        <div id="tab-reunion" class="tab-content">
            <div id="reunion-autosave-status" class="autosave-status" role="status" aria-live="polite"></div>
            <div class="section">
                <h2 class="section-title">Sélectionner une réunion</h2>
                <div class="form-group">
                    <label class="form-label">Date de la réunion :</label>
                    <select class="form-select form-select-small" id="reunion-date-select">
                        <option value="">-- Choisir une date --</option>
                        <!-- Généré dynamiquement -->
                    </select>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">Ordre du jour</h2>
                <div class="table-container" id="reunion-odj-table">
                    <!-- Généré dynamiquement -->
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">Dossiers à échéance</h2>
                <div class="table-container" id="reunion-echeance-table">
                    <!-- Généré dynamiquement -->
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">Dossiers échus non clôturés</h2>
                <div class="table-container" id="reunion-expired-table">
                    <!-- Généré dynamiquement -->
                </div>
            </div>

            <div class="button-group hidden" id="reunion-print-button-container">
                <button type="button" class="btn-secondary" id="btn-print-reunion">🖨️ Imprimer</button>
            </div>
        </div>

        <!-- ONGLET CONSULTER -->
        <div id="tab-consulter" class="tab-content">
            <div class="consult-selector">
                <label class="consult-selector-label">Consulter par :</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="consult-type" value="date" checked>
                        <span>Date de réunion</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="consult-type" value="echeance">
                        <span>Date d'échéance</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="consult-type" value="dossier">
                        <span>Dossier</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="consult-type" value="porteur">
                        <span>Porteur</span>
                    </label>
                </div>
            </div>

            <!-- Consultation par date -->
            <div id="consult-date-selector" class="form-group">
                <label class="form-label">Sélectionner une date de réunion :</label>
                <select class="form-select form-select-small" id="consult-date-select">
                    <option value="">-- Choisir une date --</option>
                    <!-- Généré dynamiquement -->
                </select>
            </div>

            <!-- Consultation par dossier -->
            <div id="consult-dossier-selector" class="form-group hidden">
                <label class="form-label">Sélectionner un dossier :</label>
                <div class="autocomplete-container input-with-clear">
                    <input type="text" class="form-input" id="consult-dossier-input"
                        placeholder="Rechercher un dossier...">
                    <button type="button" class="btn-clear-input" id="btn-clear-consult-dossier"
                        title="Effacer">×</button>
                    <div class="autocomplete-suggestions"></div>
                </div>
            </div>

            <!-- Consultation par porteur -->
            <div id="consult-porteur-selector" class="form-group hidden">
                <label class="form-label">Sélectionner un porteur :</label>
                <select class="form-select form-select-small" id="consult-porteur-select">
                    <option value="">-- Choisir un porteur --</option>
                    <!-- Généré dynamiquement -->
                </select>

                <div class="filter-controls mt-20 hidden" id="consult-porteur-filters">
                    <div class="filter-group">
                        <div class="filter-title">Trier par :</div>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="sort-type" value="reunion" checked>
                                <span>Date de réunion</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="sort-type" value="echeance">
                                <span>Date d'échéance</span>
                            </label>
                        </div>
                    </div>
                    <div class="filter-group">
                        <div class="filter-title">Filtrer par état :</div>
                        <div class="checkbox-group" id="filter-etat-checkboxes">
                            <!-- Généré dynamiquement -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Consultation par échéance -->
            <div id="consult-echeance-selector" class="form-group hidden">
                <label class="form-label">Sélectionner une date d'échéance :</label>
                <select class="form-select form-select-small" id="consult-echeance-select">
                    <option value="">-- Choisir une date --</option>
                    <!-- Généré dynamiquement -->
                </select>
            </div>

            <div class="consult-results" id="consult-results">
                <!-- Résultats affichés dynamiquement -->
            </div>

            <div class="button-group hidden" id="consult-print-button-container">
                <button type="button" class="btn-secondary" id="btn-print-consult">🖨️ Imprimer</button>
            </div>
        </div>

        <!-- ONGLET MODIFIER -->
        <div id="tab-modifier" class="tab-content">
            <div class="consult-selector">
                <label class="consult-selector-label">Modifier :</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="modify-type" value="date" checked>
                        <span>Date de réunion</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="modify-type" value="echeance">
                        <span>Date d'échéance</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="modify-type" value="dossier">
                        <span>Dossier</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="modify-type" value="porteur">
                        <span>Porteur</span>
                    </label>
                </div>
            </div>

            <!-- Sélecteurs -->
            <div id="modify-date-selector" class="form-group">
                <label class="form-label">Sélectionner une date de réunion :</label>
                <select class="form-select form-select-small" id="modify-date-select">
                    <option value="">-- Choisir une date --</option>
                    <!-- Généré dynamiquement -->
                </select>
            </div>

            <div id="modify-dossier-selector" class="form-group hidden">
                <label class="form-label">Sélectionner un dossier :</label>
                <div class="autocomplete-container input-with-clear">
                    <input type="text" class="form-input" id="modify-dossier-input"
                        placeholder="Rechercher un dossier...">
                    <button type="button" class="btn-clear-input" id="btn-clear-modify-dossier"
                        title="Effacer">×</button>
                    <div class="autocomplete-suggestions"></div>
                </div>
            </div>

            <div id="modify-porteur-selector" class="form-group hidden">
                <label class="form-label">Sélectionner un porteur :</label>
                <select class="form-select form-select-small" id="modify-porteur-select">
                    <option value="">-- Choisir un porteur --</option>
                    <!-- Généré dynamiquement -->
                </select>

                <div id="modify-porteur-dossier-selector" class="form-group hidden mt-20">
                    <label class="form-label">Sélectionner un dossier (optionnel) :</label>
                    <select class="form-select" id="modify-porteur-dossier-select">
                        <option value="">-- Afficher tous les dossiers du porteur --</option>
                        <!-- Généré dynamiquement -->
                    </select>
                </div>

                <div class="filter-controls mt-20 hidden" id="modify-porteur-filters">
                    <div class="filter-group">
                        <div class="filter-title">Affichage :</div>
                        <label class="toggle-label">
                            <input type="checkbox" id="modify-hide-expired" checked>
                            <span>Masquer les dossiers échus</span>
                        </label>
                    </div>
                    <div class="filter-group">
                        <div class="filter-title">Filtrer par état :</div>
                        <div class="checkbox-group" id="modify-filter-etat-checkboxes">
                            <!-- Généré dynamiquement -->
                        </div>
                    </div>
                </div>
            </div>

            <div id="modify-echeance-selector" class="form-group hidden">
                <label class="form-label">Sélectionner une date d'échéance :</label>
                <select class="form-select form-select-small" id="modify-echeance-select">
                    <option value="">-- Choisir une date --</option>
                    <!-- Généré dynamiquement -->
                </select>
            </div>

            <div class="consult-results" id="modify-results">
                <!-- Formulaires de modification affichés dynamiquement -->
            </div>

            <div class="button-group hidden" id="modify-buttons">
                <button type="button" class="btn-primary" id="btn-save-modifications">Enregistrer les
                    modifications</button>
                <button type="button" class="btn-secondary" id="btn-cancel-modifications">Annuler</button>
            </div>
        </div>
    </div>

    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="tableauDeBord.js"></script>
</body>

</html>
